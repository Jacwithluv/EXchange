{% extends "base.html" %}
{% block content %}
<div class="letters-list">
    <h2>X给你写的信</h2>
    {% for letter in letters %}
    <div class="letter-item">
        <div class="letter-date">{{ letter.date }}</div>
        <div class="letter-title">{{ letter.title }}</div>
        <div class="letter-content hidden">
            <p>{{ letter.content }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
