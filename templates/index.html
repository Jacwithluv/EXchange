{% extends "base.html" %}
{% block content %}

    <div class="envelope-container">
        <div class="envelope" id="envelope">
            <div class="wax-seal" id="waxSeal"></div>
        </div>
        <div class="letter hidden" id="letter">
            <p>亲爱的你：</p>
            <p>欢迎来到《换乘恋爱》。</p>
            <p>这是一场藏在时间里的约会。</p>
            <p>让我们一起，交换心动，交换秘密，交换未说出口的喜欢。</p>
            <button class="enter-btn" id="enterBtn">进入小屋</button>
        </div>
    </div>
    <p class="tagline">这一次，换你选择爱情。</p>
</div>
{% endblock %}
