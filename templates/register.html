{% extends "base.html" %}
{% block content %}
<div class="modal-overlay">
    <div class="modal-card">
        <button class="modal-close" onclick="window.location.href='/'">&times;</button>
        <h2 class="modal-title">注册</h2>
        
        {% if error %}
            <div class="modal-error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" class="modal-form">
            <div class="form-group">
                <input type="text" name="account" required placeholder="账号" class="modal-input">
            </div>
            <div class="form-group">
                <input type="text" name="nickname" required placeholder="昵称" class="modal-input">
            </div>
            <div class="form-group">
                <input type="password" name="password" required placeholder="密码" class="modal-input">
            </div>
            <div class="form-group">
                <input type="password" name="confirm_pwd" required placeholder="确认密码" class="modal-input">
            </div>
            <button type="submit" class="modal-btn">注册</button>
            <p class="modal-footer">已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
        </form>
    </div>
</div>
{% endblock %}
