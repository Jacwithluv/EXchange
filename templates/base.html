<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>换乘恋爱 EXchange</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- 顶部固定导航栏 -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="{{ url_for('index') }}" class="nav-brand">换乘恋爱 EXchange</a>
        </div>
        <div class="nav-right">
            {% if session.user %}
                <a href="{{ url_for('profile') }}">个人档案</a>
                <a href="{{ url_for('about') }}">关于我们</a>
            {% else %}
                <a href="{{ url_for('login') }}">登录</a>
                <a href="{{ url_for('register') }}">注册</a>
                <a href="{{ url_for('about') }}">关于我们</a>
            {% endif %}
        </div>
    </nav>

    <!-- 页面主体 -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
